<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>

    <!-- Montserrat Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

     <!-- Bootstrap -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="purchase.css">
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <div class="menu-icon" onclick="openSidebar()">
                <span class="material-icons-outlined">menu</span>
            </div>
            <div class="header-left">
                <span class="material-icons-outlined">search</span>
            </div>
            <div class="header-right">
                <span class="material-icons-outlined">notifications</span>
                <span class="material-icons-outlined">mail</span>
                <span class="material-icons-outlined">account_circle</span>
            </div>
        </header>

        <aside id="sidebar">
            <div class="sidebar-title">
                <div class="sidebar-logo">
                    <span class="material-icons-outlined">inventory</span>
                </div>
                <span class="material-icons-outlined" onclick="closeSidebar()">close</span>
            </div>

            <div class="balance-display">
                <span class="material-icons-outlined">account_balance_wallet</span>
            </div>

            <ul class="sidebar-list">
                <li>
                    <a href="dashboard.html">
                        <div class="sidebar-list-item">
                            <span class="material-icons-outlined">dashboard</span> Dashboard
                        </div>
                    </a>
                </li>
                <li>
                    <a href="inventory.html">
                        <div class="sidebar-list-item">
                            <span class="material-icons-outlined">warehouse</span> Inventory
                        </div>
                    </a>
                </li>
                <li>
                    <a href="economics.html">
                        <div class="sidebar-list-item">
                            <span class="material-icons-outlined">analytics</span> Economics
                        </div>
                    </a>
                </li>
                <li>
                    <a href="purchase.html">
                        <div class="sidebar-list-item">
                            <span class="material-icons-outlined">add_shopping_cart</span> Purchase
                        </div>
                    </a>
                </li>
                <li>
                    <a href="settings.html">
                        <div class="sidebar-list-item">
                            <span class="material-icons-outlined">settings</span> Settings
                        </div>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="main-container">
            <div class="main-title">
                <p class="font-weight-bold">PURCHASE</p>
                <button id="back-button">Back</button>
            </div>

            <div class="main-cards">
            </div>

            <div id="cart-panel" class="cart-panel">
                <h4>Shopping cart</h4>
                <div id="cart-groups"></div>
            </div>
        </main>
    </div>

    <script src="purchase.js" type="module"></script>
    <script src="sidebar.js" type="module"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</body>
</html>
